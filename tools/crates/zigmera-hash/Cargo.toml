[package]
name = "zigmera-hash"
version = "0.1.0"
edition = "2021"
description = "Canonical BLAKE3/SHA-256 hashing with schema domain tags for Zigmera artifacts"

[dependencies]
blake3 = "1.5"
sha2 = "0.10"
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"

[dev-dependencies]
tempfile = "3.8"

[features]
default = ["std"]
std = []