[package]
name = "zigmera-paths"
version = "0.1.0"
edition = "2021"
description = "Zigmera path normalization for source, package, cache, and artifact paths"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
parking_lot = "0.12"

[dev-dependencies]
tempfile = "3.8"

[features]
default = ["std"]
std = []