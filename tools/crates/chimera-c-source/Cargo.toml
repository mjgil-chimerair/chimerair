[package]
name = "chimera-c-source"
version = "0.1.0"
edition = "2021"
description = "Stable C parser fallback using tree-sitter-c for surface validation when Clang is unavailable"

[dependencies]
chimera-c-schema = { path = "../chimera-c-schema" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tree-sitter = "0.20"
tree-sitter-c = "0.20"

[dev-dependencies]
tempfile = "3.8"

[features]
default = ["std"]
std = []