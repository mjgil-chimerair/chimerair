[package]
name = "zigmera-io"
version = "0.1.0"
edition = "2021"
description = "Zigmera atomic writes, temp files, file locks, checksums, and crash-safe artifact writes"

[dependencies]
blake3 = "1.5"
sha2 = "0.10"
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
tempfile = "3.8"
walkdir = "2.4"

[dev-dependencies]

[features]
default = ["std"]
std = []