[package]
name = "chimera-c-layout"
version = "0.1.0"
edition = "2021"
description = "C layout extraction crate for sizeof, alignof, field offsets, bitfields, flexible arrays, packed/aligned attributes, target ABI, and endianness"

[dependencies]
chimera-c-schema = { path = "../chimera-c-schema" }
chimera-c-abi = { path = "../chimera-c-abi" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
blake3 = "1.5"

[dev-dependencies]
tempfile = "3.8"

[features]
default = ["std"]
std = []