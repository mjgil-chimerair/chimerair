[package]
name = "chimera-rust-dialect"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Rust semantic dialect for type/ownership/lifetime modeling"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
chimera-rust-schema = { path = "../chimera-rust-schema" }
chimera-rust-mir-import = { path = "../chimera-rust-mir-import" }