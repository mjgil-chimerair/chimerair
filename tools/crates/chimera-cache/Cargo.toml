[package]
name = "chimera-cache"
version = "0.1.0"
edition = "2021"
description = "Chimera build cache implementation"

[dependencies]
chimera-meta = { path = "../chimera-meta" }
chimera-object = { path = "../chimera-object" }
zigmera-schema = { path = "../zigmera-schema" }
zigmera-hash = { path = "../zigmera-hash" }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
tempfile = "3.8"
walkdir = "2.4"

[dev-dependencies]
predicates = "3.0"