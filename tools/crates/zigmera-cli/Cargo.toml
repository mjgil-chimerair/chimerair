[package]
name = "zigmera-cli"
version = "0.1.0"
edition = "2021"
description = "General-purpose per-file incremental Zig builder"
publish = false

[dependencies]
zigmera-zig-shim = { path = "../zigmera-zig-shim" }
clap = { version = "4.0", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
tempfile = "3.8"