[package]
name = "chimera-rust-abi"
version = "0.1.0"
edition = "2021"
description = "Rust ABI facts extraction for Chimera"
license = "Apache-2.0"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
blake3 = "1.5"
chimera-rust-schema = { path = "../chimera-rust-schema" }
