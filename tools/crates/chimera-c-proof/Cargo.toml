[package]
name = "chimera-c-proof"
version = "0.1.0"
edition = "2021"
description = "C proof artifact emitter - emit .cchproof facts for layout, signature, pointer aliasing, errno/status, varargs, wrappers, cache, link, and trust assumptions"

[dependencies]
chimera-c-dialect = { path = "../chimera-c-dialect" }
chimera-c-schema = { path = "../chimera-c-schema" }
chimera-c-abi = { path = "../chimera-c-abi" }
chimera-c-layout = { path = "../chimera-c-layout" }
chimera-meta = { path = "../chimera-meta" }
zigmera-hash = { path = "../zigmera-hash" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
tempfile = "3.8"

[features]
default = ["std"]
std = []