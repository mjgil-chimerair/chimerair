[package]
name = "zigmera-zig-shim"
version = "0.1.0"
edition = "2021"
description = "Transparent Zig shim for Bun that records sessions and forwards to real Zig"

[lib]
name = "zigmera_zig_shim"
path = "src/lib.rs"

[[bin]]
name = "zig"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
blake3 = "1.5"
log = "0.4"
env_logger = "0.11"

[dev-dependencies]
tempfile = "3.8"

[features]
default = ["std"]
std = []