[package]
name = "zair-import"
version = "0.1.0"
edition = "2021"
description = "AIR decoder for parsing real .zairpack from patched Zig compiler"

[dependencies]
zigmera-schema = { path = "../zigmera-schema" }
zigmera-hash = { path = "../zigmera-hash" }
zigmera-diagnostics = { path = "../zigmera-diagnostics" }
zigmera-dialect = { path = "../zigmera-dialect" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
tempfile = "3.8"

[features]
default = ["std"]
std = []
fixture-mode = []