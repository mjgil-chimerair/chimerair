[package]
name = "chimera-diagnostics"
version = "0.1.0"
edition = "2021"
description = "Chimera diagnostics rendering and output"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
termcolor = "1.4"
thiserror = "1.0"
codespan-reporting = "0.13"

[dev-dependencies]
tempfile = "3.8"