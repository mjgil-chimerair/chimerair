[package]
name = "chimera-proof-bridge"
version = "0.1.0"
edition = "2021"
description = "Chimera proof system bridge"

[dependencies]
chimera-adapter-zig = { path = "../chimera-adapter-zig" }
chimera-meta = { path = "../chimera-meta" }
chimera-diagnostics = { path = "../chimera-diagnostics" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tempfile = "3.8"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
