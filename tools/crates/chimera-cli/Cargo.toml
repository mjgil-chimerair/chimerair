[package]
name = "chimera-cli"
version = "0.1.0"
edition = "2021"
description = "Chimera CLI toolchain entrypoint"

[[bin]]
name = "chimera"
path = "src/main.rs"

[dependencies]
chimera-meta = { path = "../chimera-meta" }
chimera-manifest = { path = "../chimera-manifest" }
chimera-object = { path = "../chimera-object" }
chimera-diagnostics = { path = "../chimera-diagnostics" }
chimera-proof-bridge = { path = "../chimera-proof-bridge" }
chimera-build = { path = "../chimera-build" }
chimera-link = { path = "../chimera-link" }
chimera-wrappergen = { path = "../chimera-wrappergen" }
chimera-rust-source = { path = "../chimera-rust-source" }
chimera-rust-to-chimera = { path = "../chimera-rust-to-chimera" }
chimera-bun = { path = "../chimera-bun" }
zigmera-schema = { path = "../zigmera-schema" }
clap = { version = "4.4", features = ["derive", "cargo"] }
thiserror = "1.0"
anyhow = "1.0"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
indicatif = "0.17"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
tempfile = "3.8"
