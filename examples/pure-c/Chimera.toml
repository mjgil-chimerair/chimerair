# Pure C component example
#
# A simple C library that can be built with ChimeraIR.

version = "0.2.0"
name = "pure-c-example"
description = "Pure C component with ChimeraIR v0.2 manifest"

[chimera]
version = "0.1.0"

[[components]]
id = "c_utils"
language = "c"
kind = "c-source"
roots = ["src/utils.c", "src/io.c"]
include_dirs = ["include"]
defines = [{ name = "C_UTILS_VERSION", value = "1.0" }]

[[components]]
id = "c_main"
language = "c"
kind = "c-source"
roots = ["src/main.c"]

[[targets]]
triple = "x86_64-unknown-linux-gnu"
features = []

[runtime]
mode = "std"
output = "executable"